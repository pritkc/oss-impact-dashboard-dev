name: pull request preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    # Serialize gh-pages writes against the production deploy to avoid clobbering pushes.
    concurrency:
      group: gh-pages-write
      cancel-in-progress: false
    env:
      VITE_BASE_PATH: /${{ github.event.repository.name }}/pr-preview/pr-${{ github.event.number }}/
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: python -m pip install -e ".[dev]"
      - run: npm ci
      - name: Build preview site
        run: npm run build:site -- --projects projects/example.yml
        env:
          GITHUB_ACTIONS: "true"
          GITHUB_REPOSITORY: ${{ github.repository }}
      - run: touch dist/.nojekyll
      - uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: dist
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          wait-for-pages-deployment: true
          qr-code: false
  cleanup:
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    # Isolated per-PR group: merging a PR fires push (deploy) + closed (cleanup)
    # at once. A shared group would queue both and GitHub evicts the pending
    # deploy. Keeping cleanup separate lets the deploy run; the rebase-retry
    # push below tolerates running concurrently with the deploy.
    concurrency:
      group: gh-pages-cleanup-pr-${{ github.event.number }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
      - name: Remove closed PR preview
        run: |
          cd gh-pages
          preview_dir="pr-preview/pr-${{ github.event.number }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -r --ignore-unmatch "$preview_dir"
          git diff --cached --quiet || git commit -m "Remove PR ${{ github.event.number }} preview"
          for attempt in 1 2 3; do
            git push && break
            if [ "$attempt" = "3" ]; then exit 1; fi
            git pull --rebase origin gh-pages
          done
          if git ls-tree -d --name-only HEAD "$preview_dir" | grep -q .; then
            echo "Preview cleanup failed for $preview_dir" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "Removed $preview_dir from gh-pages." >> "$GITHUB_STEP_SUMMARY"
