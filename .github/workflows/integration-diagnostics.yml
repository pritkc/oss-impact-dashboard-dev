name: integration diagnostics

on:
  workflow_dispatch:
    inputs:
      project_config:
        description: "Project config under projects/"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  doctor:
    runs-on: ubuntu-latest
    env:
      PROJECT_CONFIG: ${{ inputs.project_config || vars.PROJECT_CONFIG || 'projects/mole.yml' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: python -m oss_impact_dashboard.cli validate-project --project "$PROJECT_CONFIG"
      - run: python -m oss_impact_dashboard.cli doctor --project "$PROJECT_CONFIG"
        env:
          GITHUB_TOKEN_MOLE: ${{ secrets.GITHUB_TOKEN_MOLE }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOATCOUNTER_API_KEY_MOLE: ${{ secrets.GOATCOUNTER_API_KEY_MOLE }}
      - name: Build dataset (full secrets)
        run: python -m oss_impact_dashboard.cli build-index --projects "$PROJECT_CONFIG" --safe-project --output-dir /tmp/dashboard-doctor
        env:
          GITHUB_TOKEN_MOLE: ${{ secrets.GITHUB_TOKEN_MOLE }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOATCOUNTER_API_KEY_MOLE: ${{ secrets.GOATCOUNTER_API_KEY_MOLE }}
      - name: Verify dataset sources
        run: |
          python3 -c "
          import json
          from pathlib import Path
          manifest = json.loads(Path('/tmp/dashboard-doctor/projects.json').read_text())
          project_id = manifest['default_project']
          data = json.loads(Path(f'/tmp/dashboard-doctor/projects/{project_id}.json').read_text())
          print('Items:', len(data.get('items', [])))
          for source, status in data['source_status'].items():
              msg = (status.get('message') or '')[:80]
              print(f'  {source}: {status[\"status\"]} - {msg}')
          "
