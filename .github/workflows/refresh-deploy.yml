name: refresh and deploy

on:
  workflow_dispatch:
  schedule:
    - cron: "20 10 * * 1"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "scripts/**"
      - "projects/**"
      - "manual/**"
      - "src/**"
      - "web/**"
      - "package*.json"
      - "vite.config.js"

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VITE_BASE_PATH: /${{ github.event.repository.name }}/
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: python -m pip install -e ".[dev]"
      - run: npm ci
      - run: python -m oss_impact_dashboard.cli build --project projects/mole.yml --output web/public/data/dashboard.json
        env:
          OSS_DASHBOARD_GITHUB_TOKEN: ${{ secrets.OSS_DASHBOARD_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: ruff check .
      - run: pytest
      - run: npm run test:frontend
      - run: npm run build
      - run: npm run test:build
      - run: touch dist/.nojekyll
      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: true
          clean-exclude: |
            pr-preview/
