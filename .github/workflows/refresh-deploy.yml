name: refresh and deploy

on:
  workflow_dispatch:
    inputs:
      project_config:
        description: "Project config under projects/"
        required: false
        default: ""
  schedule:
    - cron: "20 10 * * 1"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "scripts/**"
      - "projects/**"
      - "src/**"
      - "src/oss_impact_dashboard/collectors/goatcounter.py"
      - "web/**"
      - "package*.json"
      - "vite.config.js"

permissions:
  contents: write

concurrency:
  group: gh-pages-write
  cancel-in-progress: false

jobs:
  collect-rtd:
    if: github.event_name == 'schedule'
    uses: ./.github/workflows/collect-rtd-analytics.yml
    secrets: inherit

  deploy:
    needs: collect-rtd
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    env:
      VITE_BASE_PATH: /${{ github.event.repository.name }}/
      DEPLOY_PROJECT: ${{ inputs.project_config || 'projects/mole.yml' }}
    steps:
      - uses: actions/checkout@v4
      - name: Record workflow start
        run: echo "WORKFLOW_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: python -m pip install -e ".[dev]"
      - run: npm ci
      - run: python -m oss_impact_dashboard.cli validate-project --project "$DEPLOY_PROJECT"
      - name: Restore Read the Docs cache
        run: |
          PROJECT_ID="$(python -m oss_impact_dashboard.cli project-info --project "$DEPLOY_PROJECT" --field project_id)"
          bash scripts/restore-rtd-cache.sh "$PROJECT_ID"
      - name: Restore snapshot history
        run: |
          HISTORY_PATH="$(python -m oss_impact_dashboard.cli project-info --project "$DEPLOY_PROJECT" --field snapshot_history)"
          echo "HISTORY_PATH=$HISTORY_PATH" >> "$GITHUB_ENV"
          git fetch origin gh-pages --depth=1 || true
          for path in metrics-history.json; do
            git show "origin/gh-pages:$path" > "$path" 2>/dev/null || printf '{"schema_version":1,"snapshots":[]}\n' > "$path"
          done
      - name: Build site artifact
        run: npm run build:site -- --projects "$DEPLOY_PROJECT"
        env:
          GH_PAT_MOLE: ${{ secrets.GH_PAT_MOLE }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOATCOUNTER_API_KEY_MOLE: ${{ secrets.GOATCOUNTER_API_KEY_MOLE }}
      - run: python -m oss_impact_dashboard.cli snapshot-append --dataset web/public/data/dashboard.json --history "$HISTORY_PATH" --branch "${GITHUB_REF_NAME}"
      - run: cp metrics-history.json dist/
      - name: Restore existing PDF report
        run: |
          REPORT_PROJECT_ID="$(python -m oss_impact_dashboard.cli project-info --project "$DEPLOY_PROJECT" --field project_id)"
          REPORT_ENVIRONMENT="$(python -m oss_impact_dashboard.cli project-info --project "$DEPLOY_PROJECT" --field environment)"
          mkdir -p .gh-pages-report
          git fetch origin gh-pages --depth=1 || true
          git show "origin/gh-pages:reports/latest.pdf" > .gh-pages-report/latest.pdf 2>/dev/null || true
          git show "origin/gh-pages:report-status.json" > .gh-pages-report/report-status.json 2>/dev/null || true
          node scripts/restore-report-pdf.mjs .gh-pages-report dist "$REPORT_PROJECT_ID" "$REPORT_ENVIRONMENT"
      - name: Write deployment marker
        run: |
          node scripts/deployment-marker.mjs dist "${{ github.run_id }}-${{ github.run_attempt }}" "${{ github.sha }}" "$WORKFLOW_STARTED_AT"
      - run: touch dist/.nojekyll
      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: true
          # Rebase onto the remote instead of force-pushing so a concurrent
          # PR-preview cleanup push is not clobbered (and previews are not
          # resurrected by an out-of-date force push).
          force: false
          clean-exclude: |
            pr-preview/
      - name: Post-deployment smoke
        run: |
          REPORT_PROJECT_ID="$(python -m oss_impact_dashboard.cli project-info --project "$DEPLOY_PROJECT" --field project_id)"
          REPORT_ENVIRONMENT="$(python -m oss_impact_dashboard.cli project-info --project "$DEPLOY_PROJECT" --field environment)"
          BASE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          node scripts/wait-for-deployment.mjs "${BASE_URL}deployment-marker.json" "${{ github.run_id }}-${{ github.run_attempt }}" 300000
          node scripts/post-deploy-smoke.mjs "$BASE_URL" "$REPORT_PROJECT_ID" "$REPORT_ENVIRONMENT" "$HISTORY_PATH" site "${{ github.run_id }}-${{ github.run_attempt }}" "${{ github.sha }}" "$WORKFLOW_STARTED_AT"
