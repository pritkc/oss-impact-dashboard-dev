name: generate report

on:
  workflow_dispatch:
  schedule:
    - cron: "35 10 1 * *"

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: python -m pip install -e ".[report]"
      - run: npm ci
      - run: python -m oss_impact_dashboard.cli build --project projects/mole.yml --output web/public/data/dashboard.json
        env:
          OSS_DASHBOARD_GITHUB_TOKEN: ${{ secrets.OSS_DASHBOARD_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run build
      - run: npm run test:build
      - run: npm run preview:pages -- 4173 &
      - run: python -m playwright install chromium
      - run: python -m oss_impact_dashboard.report_pdf --url http://127.0.0.1:4173/${{ github.event.repository.name }}/report.html --output reports/latest.pdf
      - uses: actions/upload-artifact@v4
        with:
          name: latest-impact-report
          path: reports/latest.pdf
