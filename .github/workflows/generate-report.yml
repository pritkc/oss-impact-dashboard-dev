name: generate report

on:
  workflow_dispatch:
    inputs:
      project_config:
        description: "Project config under projects/"
        required: false
        default: ""
  schedule:
    - cron: "35 10 1 * *"

permissions:
  contents: write

concurrency:
  group: gh-pages-write
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      VITE_BASE_PATH: /${{ github.event.repository.name }}/
      DEPLOY_PROJECT: ${{ inputs.project_config || 'projects/mole.yml' }}
    steps:
      - uses: actions/checkout@v4
      - name: Record workflow start
        run: echo "WORKFLOW_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: python -m pip install -e ".[dev,report]"
      - run: npm ci
      - run: python -m oss_impact_dashboard.cli validate-project --project "$DEPLOY_PROJECT"
      - name: Restore Read the Docs cache
        run: |
          PROJECT_ID="$(python -m oss_impact_dashboard.cli project-info --project "$DEPLOY_PROJECT" --field project_id)"
          bash scripts/restore-rtd-cache.sh "$PROJECT_ID"
      - name: Resolve report identity
        run: |
          echo "REPORT_PROJECT_ID=$(python -m oss_impact_dashboard.cli project-info --project "$DEPLOY_PROJECT" --field project_id)" >> "$GITHUB_ENV"
          echo "REPORT_ENVIRONMENT=$(python -m oss_impact_dashboard.cli project-info --project "$DEPLOY_PROJECT" --field environment)" >> "$GITHUB_ENV"
          echo "HISTORY_PATH=$(python -m oss_impact_dashboard.cli project-info --project "$DEPLOY_PROJECT" --field snapshot_history)" >> "$GITHUB_ENV"
      - name: Build site artifact
        run: npm run build:site -- --projects "$DEPLOY_PROJECT"
        env:
          GITHUB_TOKEN_MOLE: ${{ secrets.GITHUB_TOKEN_MOLE }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOATCOUNTER_API_KEY_MOLE: ${{ secrets.GOATCOUNTER_API_KEY_MOLE }}
      - run: npm run preview:pages -- 4173 &
      - run: node scripts/wait-for-url.mjs http://127.0.0.1:4173/${{ github.event.repository.name }}/report.html
      - run: python -m playwright install chromium
      - run: python -m oss_impact_dashboard.report_pdf --url http://127.0.0.1:4173/${{ github.event.repository.name }}/report.html --output reports/latest.pdf
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
      - name: Synchronize gh-pages
        run: |
          cd gh-pages
          git fetch origin gh-pages
          git reset --hard origin/gh-pages
      - name: Publish PDF into checkout
        env:
          REPORT_BUILD_ID: ${{ github.run_id }}-${{ github.run_attempt }}
        run: node scripts/publish-report-pdf.mjs reports/latest.pdf gh-pages
      - run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/latest.pdf report-status.json
          git diff --cached --quiet || git commit -m "Publish latest PDF report"
          for attempt in 1 2 3; do
            git push && break
            if [ "$attempt" = "3" ]; then exit 1; fi
            git fetch origin gh-pages
            git reset --hard origin/gh-pages
            git add reports/latest.pdf report-status.json
            git diff --cached --quiet || git commit -m "Publish latest PDF report"
          done
      - name: Post-report smoke
        run: |
          BASE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          node scripts/wait-for-url.mjs "${BASE_URL}reports/latest.pdf" 120000
          node scripts/post-deploy-smoke.mjs "$BASE_URL" "$REPORT_PROJECT_ID" "$REPORT_ENVIRONMENT" "$HISTORY_PATH" report "${{ github.run_id }}-${{ github.run_attempt }}" "$WORKFLOW_STARTED_AT"
      - uses: actions/upload-artifact@v4
        with:
          name: latest-impact-report
          path: reports/latest.pdf
