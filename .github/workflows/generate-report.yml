name: generate report

on:
  workflow_dispatch:
    inputs:
      project_config:
        description: "Project config under projects/"
        required: false
        default: ""
  schedule:
    - cron: "35 10 1 * *"

permissions:
  contents: write

concurrency:
  group: gh-pages-write
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      VITE_BASE_PATH: /${{ github.event.repository.name }}/
      PROJECT_CONFIG: ${{ inputs.project_config || vars.PROJECT_CONFIG || 'projects/mole.yml' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: python -m pip install -e ".[report]"
      - run: npm ci
      - run: python -m oss_impact_dashboard.cli validate-project --project "$PROJECT_CONFIG"
      - name: Resolve report identity
        run: |
          echo "REPORT_PROJECT_ID=$(python -m oss_impact_dashboard.cli project-info --project "$PROJECT_CONFIG" --field project_id)" >> "$GITHUB_ENV"
          echo "REPORT_ENVIRONMENT=$(python -m oss_impact_dashboard.cli project-info --project "$PROJECT_CONFIG" --field environment)" >> "$GITHUB_ENV"
      - run: python -m oss_impact_dashboard.cli build --project "$PROJECT_CONFIG" --safe-project --output web/public/data/dashboard.json
        env:
          OSS_DASHBOARD_GITHUB_TOKEN: ${{ secrets.OSS_DASHBOARD_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOATCOUNTER_API_KEY: ${{ secrets.GOATCOUNTER_API_KEY }}
          GOATCOUNTER_SITE_URL: ${{ vars.GOATCOUNTER_SITE_URL }}
          GOATCOUNTER_TRACKED_DOMAIN: ${{ vars.GOATCOUNTER_TRACKED_DOMAIN }}
      - run: npm run build
        env:
          GOATCOUNTER_SITE_URL: ${{ vars.GOATCOUNTER_SITE_URL }}
          GOATCOUNTER_TRACKED_DOMAIN: ${{ vars.GOATCOUNTER_TRACKED_DOMAIN }}
      - run: npm run test:build
      - run: npm run preview:pages -- 4173 &
      - run: node scripts/wait-for-url.mjs http://127.0.0.1:4173/${{ github.event.repository.name }}/report.html
      - run: python -m playwright install chromium
      - run: python -m oss_impact_dashboard.report_pdf --url http://127.0.0.1:4173/${{ github.event.repository.name }}/report.html --output reports/latest.pdf
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
      - run: node scripts/publish-report-pdf.mjs reports/latest.pdf gh-pages
      - run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages --depth=1
          git pull --rebase origin gh-pages
          git add reports/latest.pdf report-status.json
          git diff --cached --quiet || git commit -m "Publish latest PDF report"
          for attempt in 1 2 3; do
            git push && break
            if [ "$attempt" = "3" ]; then exit 1; fi
            git pull --rebase origin gh-pages
          done
      - name: Post-report smoke
        run: |
          BASE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          node scripts/wait-for-url.mjs "${BASE_URL}reports/latest.pdf" 120000
          node scripts/post-deploy-smoke.mjs "$BASE_URL" "$REPORT_PROJECT_ID" "$REPORT_ENVIRONMENT" metrics-history-dev.json report
      - uses: actions/upload-artifact@v4
        with:
          name: latest-impact-report
          path: reports/latest.pdf
