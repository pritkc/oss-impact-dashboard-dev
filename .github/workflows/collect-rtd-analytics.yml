name: collect Read the Docs analytics

on:
  workflow_dispatch:
    inputs:
      project_config:
        description: "Project config under projects/"
        required: false
        default: ""
  schedule:
    - cron: "0 9 * * 1"
  workflow_call:
    inputs:
      project_config:
        description: "Project config under projects/"
        required: false
        type: string
        default: ""

permissions:
  contents: write

concurrency:
  group: gh-pages-write
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      DEPLOY_PROJECT: ${{ inputs.project_config || 'projects/mole.yml' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: python -m pip install -e ".[dev]"
      - run: npm ci
      - run: npx playwright install chromium
      - run: python -m oss_impact_dashboard.cli validate-project --project "$DEPLOY_PROJECT"
      - name: Restore existing RTD cache
        run: |
          PROJECT_ID="$(python -m oss_impact_dashboard.cli project-info --project "$DEPLOY_PROJECT" --field project_id)"
          CACHE_DIR="data/rtd-cache/${PROJECT_ID}"
          mkdir -p "$CACHE_DIR"
          echo "CACHE_DIR=$CACHE_DIR" >> "$GITHUB_ENV"
          echo "PROJECT_ID=$PROJECT_ID" >> "$GITHUB_ENV"
          git fetch origin gh-pages --depth=1 || true
          for file in latest.json history.json collection-state.json; do
            tmp="${CACHE_DIR}/${file}.tmp"
            if git show "origin/gh-pages:rtd-cache/${PROJECT_ID}/${file}" > "$tmp" 2>/dev/null; then
              mv "$tmp" "${CACHE_DIR}/${file}"
            else
              rm -f "$tmp" "${CACHE_DIR}/${file}"
            fi
          done
      - name: Collect Read the Docs exports
        run: node scripts/collect-rtd-analytics.mjs --project "$DEPLOY_PROJECT"
        env:
          RTD_USERNAME_MOLE: ${{ secrets.RTD_USERNAME_MOLE }}
          RTD_PASSWORD_MOLE: ${{ secrets.RTD_PASSWORD_MOLE }}
          RTD_TOTP_SECRET_MOLE: ${{ secrets.RTD_TOTP_SECRET_MOLE }}
      - name: Publish RTD cache to gh-pages
        if: always()
        run: bash scripts/publish-rtd-cache.sh "$CACHE_DIR" "$PROJECT_ID"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
