# Live MOLE deployment. Generic template: projects/example.yml

project:
  id: mole
  name: MOLE
  repository: csrc-sdsu/mole
  environment: production
  documentation_url: https://mole-docs.readthedocs.io
  citation_url: https://github.com/csrc-sdsu/mole/blob/main/CITATION.cff

sources:
  github:
    enabled: true
  github_traffic:
    enabled: true
  github_actions:
    enabled: true
  readthedocs:
    enabled: true
    project_slug: mole-docs
    cache_dir: data/rtd-cache/mole
  documentation_analytics:
    provider: goatcounter
    enabled: true
    site_url: https://mole-docs.goatcounter.com
  snapshots:
    enabled: true
    history_path: metrics-history.json
  zenodo:
    enabled: true
    record_or_doi: https://zenodo.org/records/20128874
  openalex:
    enabled: true
    doi: 10.21105/joss.06288
  openssf_scorecard:
    enabled: true
  community_standards:
    enabled: false
  package_adoption:
    enabled: false

reporting:
  default_period_months: 12
  stale_days: 90
  freshness_warning_hours: 48
  label_aliases:
    bug: Bug
    enhancement: Enhancement
    documentation: Documentation
    refactoring: Refactoring
    discussion: Discussion
    "good first issue": Good first issue
    "MATLAB/Octave": Octave/MATLAB
  label_groups:
    - id: languages
      name: Language / API
      labels: [C++, "Octave/MATLAB", MOLE.jl, Fortran, python]
    - id: work_type
      name: Work type
      labels: [Bug, Enhancement, Documentation, Examples, Refactoring, Tests, "Unit Testing", format]
    - id: roadmap
      name: Roadmap & infra
      labels: [MOLE-2.0, "GitHub Actions", dependencies, "Software Vulnerability"]
    - id: community
      name: Community & triage
      labels: ["Good first issue", "Help wanted", Discussion, Question, "student project"]
    - id: workflow
      name: Workflow meta
      labels: [stale, In-progress, keep-open, Duplicate, Invalid, Wontfix]
      exclude_from_totals: true
