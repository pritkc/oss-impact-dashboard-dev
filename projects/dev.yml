project:
  id: mole-dev
  name: MOLE Development Sandbox
  repository: pritkc/mole
  environment: development
  documentation_url: null
  citation_url: null

sources:
  github:
    enabled: true

  github_traffic:
    enabled: true

  github_actions:
    enabled: true

  documentation_analytics:
    provider: goatcounter
    enabled: true

  readthedocs:
    enabled: false

  snapshots:
    enabled: true
    history_path: metrics-history-dev.json

  zenodo:
    enabled: false

  openalex:
    enabled: false

reporting:
  default_period_months: 12
  stale_days: 90
  freshness_warning_hours: 48

label_aliases:
  documentation: Documentation
  enhancement: Enhancement
  bug: Bug
  good first issue: Good first issue
  discussion: Discussion
  matlab/octave: Octave/MATLAB
  matlab: Octave/MATLAB
  octave/matlab: Octave/MATLAB

priority_label_patterns:
  - priority
  - urgent
  - critical

core_contributors:
  - pritkc
