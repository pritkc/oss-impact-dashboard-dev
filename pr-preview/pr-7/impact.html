<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>Impact and Funding</title>
    <script type="module" crossorigin src="/oss-impact-dashboard-dev/pr-preview/pr-7/assets/app-Bpihsq5w.js"></script>
    <link rel="stylesheet" crossorigin href="/oss-impact-dashboard-dev/pr-preview/pr-7/assets/app-DNP77J3L.css">
  </head>
  <body data-page="impact">
    <header class="topbar">
      <a class="brand" href="./">OSS Impact Dashboard</a>
      <nav>
        <a href="./">Overview</a>
        <a href="./operations.html">Operations</a>
        <a aria-current="page" href="./impact.html">Impact</a>
        <a href="./report.html">Report</a>
      </nav>
    </header>
    <main class="shell">
      <section class="page-head">
        <h1>Impact and Funding</h1>
        <button class="button" type="button" onclick="window.print()">Print</button>
      </section>
      <section class="stats" data-impact-summary></section>
      <section class="grid two">
        <article class="panel">
          <h2>Citations by year</h2>
          <canvas id="citationChart" height="180"></canvas>
          <p class="chart-summary" data-chart-summary="citationChart"></p>
        </article>
        <article class="panel">
          <h2>Private sources</h2>
          <div data-private-sources class="status-list"></div>
        </article>
      </section>
      <section class="grid two">
        <article class="panel">
          <h2>Release downloads</h2>
          <canvas id="releaseChart" height="180"></canvas>
        </article>
        <article class="panel" data-releases></article>
      </section>
      <section class="grid two">
        <article class="panel">
          <h2>Contributor trend</h2>
          <canvas id="contributorChart" height="180"></canvas>
        </article>
        <article class="panel" data-contributors></article>
      </section>
      <section class="grid two">
        <article class="panel" data-docs-analytics></article>
        <article class="panel">
          <h2>Impact history</h2>
          <canvas id="snapshotTrendChart" height="180"></canvas>
        </article>
      </section>
      <section class="grid two">
        <article class="panel" data-manual-funding></article>
        <article class="panel" data-case-studies></article>
      </section>
    </main>
  </body>
</html>
