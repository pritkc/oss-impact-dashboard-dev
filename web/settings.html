<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <title>Dashboard Settings</title>
    <script>
      (function(){
        var t = localStorage.getItem('oss-dashboard-theme');
        if(!t){ t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'; }
        document.documentElement.dataset.theme = t;
      })();
    </script>
    <script type="module" src="./src/app.js"></script>
  </head>
  <body data-page="settings">
    <header class="topbar">
      <a class="brand" href="./" data-project-nav>OSS Impact Dashboard</a>
      <select class="project-picker" data-project-picker aria-label="Select project" hidden></select>
      <nav>
        <a href="./" data-project-nav>Dashboard</a>
        <a aria-current="page" href="./settings.html" data-project-nav>Settings</a>
      </nav>
      <div class="topbar-actions">
        <a class="icon-button" href="./report.html" data-project-nav title="Print report" aria-label="Print report">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
            <rect x="6" y="14" width="12" height="8"/>
          </svg>
        </a>
        <button class="theme-toggle" type="button" aria-label="Toggle theme">☽</button>
      </div>
    </header>
    <main class="shell">
      <div class="page-head">
        <div>
          <h1>Settings &amp; diagnostics</h1>
          <p class="page-meta">Integration health and metric reference for this dashboard.</p>
        </div>
      </div>
      <div class="dashboard-grid">
        <article class="panel col-12">
          <h2>Project configuration</h2>
          <div data-project-config class="status-list"></div>
        </article>
        <article class="panel col-12">
          <h2>Source availability</h2>
          <div data-source-status class="status-list"></div>
        </article>
        <article class="panel col-12">
          <h2>Metric definitions</h2>
          <div data-definitions class="definition-grid"></div>
        </article>
        <article class="panel col-12" data-section="securityHealth">
          <h2>Security health</h2>
        </article>
      </div>
    </main>
  </body>
</html>
