<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <title>Impact</title>
    <script>
      (function(){
        var t = localStorage.getItem('oss-dashboard-theme');
        if(!t){ t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'; }
        document.documentElement.dataset.theme = t;
      })();
    </script>
    <script type="module" src="./src/app.js"></script>
  </head>
  <body data-page="impact">
    <header class="topbar">
      <a class="brand" href="./">OSS Impact Dashboard</a>
      <nav>
        <a href="./">Overview</a>
        <a href="./operations.html">Operations</a>
        <a aria-current="page" href="./impact.html">Impact</a>
        <a href="./report.html">Report</a>
      </nav>
      <div class="topbar-actions">
        <button class="theme-toggle" type="button" aria-label="Toggle theme">☽</button>
      </div>
    </header>
    <main class="shell">
      <div class="page-head">
        <div>
          <h1>Impact</h1>
          <p class="page-meta">Citations, downloads, releases, contributors and documentation usage.</p>
        </div>
      </div>
      <section class="kpi-strip" data-impact-summary></section>
      <div class="dashboard-grid">
        <article class="panel col-6" data-citations-panel>
          <h2>Citations by year</h2>
          <div class="chart-container" style="height:280px;">
            <canvas id="citationChart"></canvas>
          </div>
          <p class="chart-summary" data-chart-summary="citationChart"></p>
        </article>
        <article class="panel col-6" data-release-panel>
          <h2>Release adoption and delivery</h2>
          <div class="chart-container" style="height:280px;">
            <canvas id="releaseChart"></canvas>
          </div>
          <div data-section="releases"></div>
        </article>
        <article class="panel col-6" data-contributor-panel>
          <h2>Contributors</h2>
          <div class="chart-container" style="height:280px;">
            <canvas id="contributorChart"></canvas>
          </div>
          <div data-section="contributors"></div>
        </article>
        <article class="panel col-6" data-section="docsAnalytics">
          <h2>Documentation analytics</h2>
        </article>
        <article class="panel col-12" data-snapshot-panel>
          <h2>Impact history</h2>
          <div class="chart-container" style="height:280px;">
            <canvas id="snapshotTrendChart"></canvas>
          </div>
        </article>
      </div>
    </main>
  </body>
</html>
