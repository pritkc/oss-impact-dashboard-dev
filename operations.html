<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>Maintainer Operations</title>
    <script type="module" crossorigin src="/oss-impact-dashboard-dev/assets/app-BBP2hu56.js"></script>
    <link rel="stylesheet" crossorigin href="/oss-impact-dashboard-dev/assets/app-BW9pQGdr.css">
  </head>
  <body data-page="operations">
    <header class="topbar">
      <a class="brand" href="./">OSS Impact Dashboard</a>
      <nav>
        <a href="./">Overview</a>
        <a aria-current="page" href="./operations.html">Operations</a>
        <a href="./impact.html">Impact</a>
        <a href="./report.html">Report</a>
      </nav>
    </header>
    <main class="shell">
      <section class="page-head">
        <h1>Maintainer Operations</h1>
        <div class="actions">
          <input id="search" type="search" placeholder="Search issues and PRs" />
          <select id="typeFilter">
            <option value="">All types</option>
            <option value="issue">Issues</option>
            <option value="pull_request">Pull requests</option>
          </select>
          <select id="stateFilter">
            <option value="">All states</option>
            <option value="open">Open</option>
            <option value="closed">Closed</option>
            <option value="merged">Merged</option>
          </select>
          <select id="labelFilter"><option value="">All labels</option></select>
          <select id="authorFilter"><option value="">All authors</option></select>
          <select id="periodFilter"></select>
          <input id="createdFromFilter" type="date" aria-label="Created from" />
          <input id="createdToFilter" type="date" aria-label="Created to" />
          <input id="closedFromFilter" type="date" aria-label="Closed from" />
          <input id="closedToFilter" type="date" aria-label="Closed to" />
          <input id="ageMinFilter" type="number" min="0" placeholder="Min age" aria-label="Minimum age days" />
          <input id="ageMaxFilter" type="number" min="0" placeholder="Max age" aria-label="Maximum age days" />
          <button class="button" id="clearFilters" type="button">Clear</button>
          <button class="button" id="csvExport" type="button">CSV</button>
          <button class="button" id="jsonExport" type="button">JSON</button>
        </div>
        <p class="filter-summary" data-filter-summary></p>
      </section>
      <section class="stats" data-summary></section>
      <section class="grid two">
        <article class="panel">
          <h2>Opened vs completed</h2>
          <canvas id="activityChart" height="180"></canvas>
          <p class="chart-summary" data-chart-summary="activityChart"></p>
        </article>
        <article class="panel">
          <h2>Backlog</h2>
          <canvas id="backlogChart" height="180"></canvas>
          <p class="chart-summary" data-chart-summary="backlogChart"></p>
        </article>
      </section>
      <section class="grid four">
        <article class="panel">
          <h2>Open-item age</h2>
          <canvas id="ageBucketChart" height="180"></canvas>
          <p class="chart-summary" data-chart-summary="ageBucketChart"></p>
        </article>
        <article class="panel">
          <h2>Label workload</h2>
          <canvas id="labelChart" height="180"></canvas>
          <p class="chart-summary" data-chart-summary="labelChart"></p>
        </article>
        <article class="panel">
          <h2>Backlog composition</h2>
          <canvas id="compositionChart" height="180"></canvas>
        </article>
        <article class="panel">
          <h2>Percentiles</h2>
          <canvas id="completionDistributionChart" height="180"></canvas>
        </article>
      </section>
      <section class="panel">
        <h2>CI reliability</h2>
        <div data-ci-reliability class="status-list"></div>
      </section>
      <section class="grid four" data-queues></section>
      <section class="panel">
        <h2>All issues and pull requests</h2>
        <div id="itemsTable"></div>
      </section>
    </main>
  </body>
</html>
