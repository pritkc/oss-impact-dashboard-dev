<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>OSS Impact Dashboard</title>
    <script type="module" crossorigin src="/oss-impact-dashboard-dev/assets/app-C_ORs9CO.js"></script>
    <link rel="stylesheet" crossorigin href="/oss-impact-dashboard-dev/assets/app-DhI6RQgB.css">
  </head>
  <body data-page="overview">
    <header class="topbar">
      <a class="brand" href="./">OSS Impact Dashboard</a>
      <nav>
        <a aria-current="page" href="./">Overview</a>
        <a href="./operations.html">Operations</a>
        <a href="./impact.html">Impact</a>
        <a href="./report.html">Report</a>
      </nav>
    </header>
    <main class="shell">
      <section class="hero">
        <div>
          <h1 data-project-name>Project dashboard</h1>
          <p data-project-subtitle>Loading public operations, release, contributor and impact metrics.</p>
        </div>
        <div class="hero-actions">
          <a class="button primary" data-repo-link href="#">GitHub</a>
          <button class="button" type="button" onclick="window.print()">Print</button>
        </div>
      </section>
      <section class="stats" data-summary></section>
      <section class="grid two">
        <article class="panel">
          <h2>Activity trend</h2>
          <canvas id="activityChart" height="180"></canvas>
        </article>
        <article class="panel">
          <h2>Source availability</h2>
          <div data-source-status class="status-list"></div>
        </article>
      </section>
      <section class="panel">
        <h2>Metric definitions</h2>
        <div data-definitions class="definition-grid"></div>
      </section>
    </main>
  </body>
</html>
